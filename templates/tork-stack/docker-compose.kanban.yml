services:
  kanban-postgres:
    image: {{POSTGRES_IMAGE}}
    environment:
      POSTGRES_DB: {{KANBAN_POSTGRES_DB}}
      POSTGRES_USER: {{KANBAN_POSTGRES_USER}}
      POSTGRES_PASSWORD: {{KANBAN_POSTGRES_PASSWORD}}
    volumes:
      - kanban-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U {{KANBAN_POSTGRES_USER}} -d {{KANBAN_POSTGRES_DB}}"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped
    networks:
      - {{NETWORK}}

  kanban-backend:
    image: {{KANBAN_BACKEND_IMAGE}}
    build:
      context: ../backend
    environment:
      PORT: 8080
      DATABASE_URL: "postgresql://{{KANBAN_POSTGRES_USER}}:{{KANBAN_POSTGRES_PASSWORD}}@kanban-postgres:5432/{{KANBAN_POSTGRES_DB}}"
      KANBAN_API_KEY: "{{KANBAN_API_KEY}}"
      PUBLIC_BASE_URL: "https://{{KANBAN_DOMAIN}}"
      CHATWOOT_BASE_URL: "https://{{CHATWOOT_DOMAIN}}"
      CHATWOOT_API_TOKEN: "{{CHATWOOT_API_TOKEN}}"
      CHATWOOT_DATABASE_URL: "{{CHATWOOT_DATABASE_URL}}"
      CHATWOOT_STORAGE_PATH: /chatwoot-storage
      CHATWOOT_WEBHOOK_SECRET: "{{CHATWOOT_WEBHOOK_SECRET}}"
      CHATWOOT_ASSIGNEE_SYNC_SECONDS: {{CHATWOOT_ASSIGNEE_SYNC_SECONDS}}
      DEFAULT_ACCOUNT_ID: {{DEFAULT_ACCOUNT_ID}}
      DEFAULT_BOARD_NAME: "{{DEFAULT_BOARD_NAME}}"
      FOLLOW_UP_AFTER_HOURS: {{FOLLOW_UP_AFTER_HOURS}}
      LOST_AFTER_ATTEMPTS: {{LOST_AFTER_ATTEMPTS}}
      MAX_JSON_BODY_BYTES: {{MAX_JSON_BODY_BYTES}}
      RATE_LIMIT_WINDOW_MS: {{RATE_LIMIT_WINDOW_MS}}
      RATE_LIMIT_MAX_REQUESTS: {{RATE_LIMIT_MAX_REQUESTS}}
      CORS_ORIGIN: "{{CORS_ORIGIN}}"
    depends_on:
      kanban-postgres:
        condition: service_healthy
    volumes:
      - chatwoot-storage:/chatwoot-storage:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      {{NETWORK}}:
        aliases:
          - {{CLIENT_ID}}-kanban-backend
          - {{CLIENT_ID}}-backend
          - kanban-backend
          - backend

  kanban-frontend:
    image: {{KANBAN_FRONTEND_IMAGE}}
    build:
      context: ../frontend
    environment:
      KANBAN_API_KEY: "{{KANBAN_API_KEY}}"
      FRONTEND_ACCOUNT_ID: {{DEFAULT_ACCOUNT_ID}}
    {{KANBAN_PORTS_BLOCK}}
    depends_on:
      - kanban-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      {{NETWORK}}:
        aliases:
          - {{CLIENT_ID}}-kanban-frontend
          - kanban-frontend

volumes:
  kanban-postgres-data:
  chatwoot-storage:
    name: {{CHATWOOT_STORAGE_VOLUME}}

networks:
  {{NETWORK}}:
    external: true
