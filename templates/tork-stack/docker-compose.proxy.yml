services:
  proxy:
    image: {{PROXY_IMAGE}}
    ports:
      - "{{PROXY_HTTP_PORT}}:80"
      - "{{PROXY_HTTPS_PORT}}:443"
      - "{{PROXY_ADMIN_PORT}}:81"
    volumes:
      - proxy-data:/data
      - proxy-letsencrypt:/etc/letsencrypt
    restart: unless-stopped
    networks:
      - {{NETWORK}}

volumes:
  proxy-data:
  proxy-letsencrypt:

networks:
  {{NETWORK}}:
    external: true
