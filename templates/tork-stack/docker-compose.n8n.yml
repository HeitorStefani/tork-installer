services:
  n8n-postgres:
    image: {{POSTGRES_IMAGE}}
    environment:
      POSTGRES_DB: {{N8N_POSTGRES_DB}}
      POSTGRES_USER: {{N8N_POSTGRES_USER}}
      POSTGRES_PASSWORD: "{{N8N_POSTGRES_PASSWORD}}"
    volumes:
      - n8n-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U {{N8N_POSTGRES_USER}} -d {{N8N_POSTGRES_DB}}"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped
    networks:
      - {{NETWORK}}

  n8n:
    image: {{N8N_IMAGE}}
    depends_on:
      n8n-postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_DATABASE: {{N8N_POSTGRES_DB}}
      DB_POSTGRESDB_USER: {{N8N_POSTGRES_USER}}
      DB_POSTGRESDB_PASSWORD: {{N8N_POSTGRES_PASSWORD}}
      N8N_HOST: {{N8N_DOMAIN}}
      N8N_PROTOCOL: https
      WEBHOOK_URL: "https://{{N8N_DOMAIN}}/"
      N8N_ENCRYPTION_KEY: "{{N8N_ENCRYPTION_KEY}}"
    volumes:
      - n8n-data:/home/node/.n8n
    restart: unless-stopped
    networks:
      {{NETWORK}}:
        aliases:
          - {{CLIENT_ID}}-n8n
          - n8n

volumes:
  n8n-postgres-data:
  n8n-data:

networks:
  {{NETWORK}}:
    external: true
